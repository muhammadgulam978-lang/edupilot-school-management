{% extends "teacher_dashboard/bases.html" %}
{% block content %}

<h3>Upload Chapter PDF</h3>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <input type="text" name="title" placeholder="Chapter title" class="form-control mb-2">

    <input type="file" name="pdf_file" class="form-control mb-3" required>

    <button class="btn btn-primary">Upload & Parse</button>
</form>

{% endblock %}
