{% extends 'base.html' %}

{% block content %}
<style>
    /* Styling direct register.html mein */
    .form-container {
        max-width: 900px;
        margin: auto;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .form-row {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
    }
    .form-group {
        flex: 1 1 45%; /* Do columns ke liye */
        min-width: 300px;
    }
    label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
        color: #333;
    }
    input, select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ced4da;
        border-radius: 4px;
        background-color: #f9f9f9;
    }
    .btn-submit {
        background-color: #28a745;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
    }
</style>

<div class="container mt-4">
    <div class="form-container">
        <h2 class="mb-4 text-center">Student Registration Form</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-row">
                {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
            </div>

            <div class="mt-4">
                <button type="submit" class="btn-submit">Register Student</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
